<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Tabs Exporter</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <h1>Tabs Exporter</h1>
    <p class="subtitle">Export open tabs as Markdown</p>
  </header>

  <main>
    <div id="main-view" class="view">
      <button id="export-md" class="btn btn-primary" type="button">
        <span class="btn-icon" aria-hidden="true">&#8681;</span>
        Export All to Markdown
      </button>

      <button id="export-drive" class="btn" type="button">
        <span class="btn-icon" aria-hidden="true">&#9729;</span>
        Export All to Google Drive
      </button>

      <button id="export-incognito" class="btn" type="button">
        <span class="btn-icon" aria-hidden="true">&#127913;</span>
        Export Incognito Only
      </button>

      <hr>

      <button id="close-all" class="btn btn-danger" type="button">
        <span class="btn-icon" aria-hidden="true">&#10005;</span>
        Close All Tabs
      </button>

      <section id="confirm-panel" class="confirm" hidden>
        <p id="confirm-text" class="confirm-text"></p>
        <div class="confirm-actions">
          <button id="confirm-close" class="btn btn-danger" type="button">Yes, close everything</button>
          <button id="cancel-close" class="btn" type="button">Cancel</button>
        </div>
      </section>
    </div>

    <div id="drive-view" class="view" hidden>
      <button id="drive-back" class="btn btn-back" type="button">
        <span aria-hidden="true">&#8592;</span> Back
      </button>

      <p class="view-caption">Export all tabs to Google Drive&hellip;</p>

      <button id="drive-as-md" class="btn" type="button">
        <span class="btn-icon" aria-hidden="true">&#9636;</span>
        as Markdown file
      </button>

      <button id="drive-as-doc" class="btn" type="button">
        <span class="btn-icon" aria-hidden="true">&#9998;</span>
        as native document
      </button>

      <div class="folder-row">
        <span class="folder-label">Folder: <strong id="folder-name">My Drive</strong></span>
        <span class="folder-actions">
          <button id="folder-change" class="btn btn-mini" type="button">Change&hellip;</button>
          <button id="folder-new" class="btn btn-mini" type="button">New folder</button>
        </span>
      </div>

      <div id="new-folder-panel" class="new-folder" hidden>
        <input id="new-folder-name" type="text" placeholder="New folder name" maxlength="128">
        <div class="confirm-actions">
          <button id="new-folder-create" class="btn btn-mini" type="button">Create</button>
          <button id="new-folder-cancel" class="btn btn-mini" type="button">Cancel</button>
        </div>
      </div>
    </div>

    <div id="status" class="status" role="status" aria-live="polite" hidden>
      <span id="status-text"></span>
      <a id="status-link" target="_blank" rel="noopener noreferrer" hidden></a>
    </div>
  </main>

  <script type="module" src="popup.js"></script>
</body>
</html>
